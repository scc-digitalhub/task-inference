apiVersion: "nuclio.io/v1"
kind: NuclioFunction
metadata:
  name: openinference-test
  namespace: nuclio
spec:
  runtime: python
  handler: handler:handler
  triggers:
    openinference:
      kind: openinference
      attributes:
        model_name: "google/vit-base-patch16-224"
        model_version: "1.0"
        enable_rest: true
        enable_grpc: true
        rest_port: 8080
        grpc_port: 9000
        input_tensors:
          - name: "image"
            datatype: "BYTES"
            shape: [-1]
        output_tensors:
          - name: "labels"
            datatype: "BYTES"
            shape: [-1, -1]
          - name: "scores"
            datatype: "FP32"
            shape: [-1, -1]  
      max_workers: 4
